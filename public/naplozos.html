<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Napló kezelő</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>


  <link rel="stylesheet" href="style.css">
  <script src="common_studio13.js"></script>
  <link rel="icon" href="/favicon-32x32.png" type="image/png">
</head>


<body>
<div class="app-wrap">


  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="m-0">Napló kezelő (Admin)</h2>
  </div>


  <ul class="nav nav-tabs">
    <li class="nav-item">
      <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#kibe_tab">
        KIBE napló
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="tab" data-bs-target="#kikero_tab">
        KIKÉRŐ napló
      </button>
    </li>
  </ul>


  <div class="tab-content app-card mt-3">


    <!-- ================= KIBE ================= -->
    <div class="tab-pane fade show active" id="kibe_tab">
      <table class="table app-table table-sm">
        <thead>
          <tr>
            <th>ID</th>
            <th>Név</th>
            <th>Dátum</th>
            <th>Be/Ki</th>
            <th>RFID</th>
            <th>Késés</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="kibe_tb">
          <tr><td colspan="7">Betöltés...</td></tr>
        </tbody>
      </table>
    </div>


    <!-- ================= KIKERO ================= -->
    <div class="tab-pane fade" id="kikero_tab">
      <table class="table app-table table-sm">
        <thead>
          <tr>
            <th>ID</th>
            <th>Diák</th>
            <th>Tanár</th>
            <th>Nap</th>
            <th>Ok</th>
            <th>Állapot</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="kikero_tb">
          <tr><td colspan="7">Betöltés...</td></tr>
        </tbody>
      </table>
    </div>


  </div>
</div>


<script>
(function(){


  // ---------- KIBE ----------
  async function loadKibe(){
    try {
      const r = await fetch("/api/admin/kibe", { credentials:"include" });
      if (!r.ok) throw new Error(await r.text());


      const data = await r.json();
      const rows = Array.isArray(data) ? data : (data.rows || []);


      document.getElementById("kibe_tb").innerHTML =
        rows.map(x => `
          <tr>
            <td>${x.ID_KIBE}</td>
            <td>${x.NEV || ""}</td>
            <td>${x.DATUMIDO ? new Date(x.DATUMIDO).toLocaleString("hu-HU") : ""}</td>
            <td>${x.DIRECTION || ""}</td>
            <td>${x.RFID_POZ || ""}</td>
            <td>${x.KESES_PERC ?? ""}</td>
            <td>
              <button class="btn btn-sm btn-danger"
                onclick="delKibe(${x.ID_KIBE})">Törlés</button>
            </td>
          </tr>
        `).join("") || `<tr><td colspan="7">Nincs adat</td></tr>`;


    } catch(e){
      document.getElementById("kibe_tb").innerHTML =
        `<tr><td colspan="7" class="text-danger">${e.message}</td></tr>`;
    }
  }


  window.delKibe = async function(id){
    if (!confirm("Biztos törlöd?")) return;
    await fetch("/api/admin/kibe/" + id, {
      method: "DELETE",
      credentials: "include"
    });
    loadKibe();
  }


  // ---------- KIKERO ----------
  async function loadKikero(){
    try {
      const r = await fetch("/api/admin/kikero", { credentials:"include" });
      if (!r.ok) throw new Error(await r.text());


      const data = await r.json();
      const rows = Array.isArray(data) ? data : (data.rows || []);


      document.getElementById("kikero_tb").innerHTML =
        rows.map(x => `
          <tr>
            <td>${x.ID_KIKERO}</td>
            <td>${x.DIAK_NEV || ""}</td>
            <td>${x.TANAR_NEV || ""}</td>
            <td>${x.NAP || ""}</td>
            <td>${x.OK || ""}</td>
            <td>${x.ALLAPOT || ""}</td>
            <td>
              <button class="btn btn-sm btn-danger"
                onclick="delKikero(${x.ID_KIKERO})">Törlés</button>
            </td>
          </tr>
        `).join("") || `<tr><td colspan="7">Nincs adat</td></tr>`;


    } catch(e){
      document.getElementById("kikero_tb").innerHTML =
        `<tr><td colspan="7" class="text-danger">${e.message}</td></tr>`;
    }
  }


  window.delKikero = async function(id){
    if (!confirm("Biztos törlöd?")) return;
    await fetch("/api/admin/kikero/" + id, {
      method: "DELETE",
      credentials: "include"
    });
    loadKikero();
  }


  // INIT
  loadKibe();
  loadKikero();


})();
</script>


</body>
</html>
