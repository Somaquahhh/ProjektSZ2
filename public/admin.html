<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin panel</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <link href="style.css" rel="stylesheet">
  <script src="common_studio13.js"></script>
  <link rel="icon" href="/favicon-32x32.png" type="image/png">
</head>

<body>
  <div class="app-wrap">
    <div class="d-flex align-items-center justify-content-between gap-2 mb-3">
      <h2 class="m-0">Admin panel</h2>
      <button id="themeToggle" type="button" class="btn btn-outline-dark btn-sm" title="Light/Dark">🌙</button>
    </div>

    <div id="msg" class="my-2"></div>

    <!-- ✅ Új felhasználó rész TÖRÖLVE -->

    <div class="app-card">
      <div class="d-flex justify-content-between align-items-center">
        <h5 class="m-0">Felhasználók</h5>
        <button id="reloadBtn" class="btn btn-secondary btn-sm">Frissítés</button>
      </div>

      <div class="app-panel app-scroll mt-3">
        <table class="table app-table table-sm align-middle">
          <thead>
            <tr>
              <th>ID</th>
              <th>Név</th>
              <th>Email</th>
              <th>Csoport</th>
              <th style="width:220px;">Művelet</th>
            </tr>
          </thead>
          <tbody id="tb">
            <tr><td colspan="5">Betöltés...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

<script>
(function () {

  const tbEl = document.getElementById("tb");
  const msgEl = document.getElementById("msg");

  function showMsg(text, ok=true){
    msgEl.innerHTML = `<div class="alert ${ok ? "alert-success" : "alert-danger"} p-2">${text}</div>`;
    setTimeout(()=> msgEl.innerHTML="", 2500);
  }

  async function mustBeBoss() {
    const r = await fetch("/api/me", { credentials:"include" });
    if (!r.ok) { location.href="/login.html"; return false; }
    const me = await r.json();
    if ((me.role || "") !== "Boss") { showMsg("Nincs jogosultságod bro 😅", false); return false; }
    return true;
  }

  async function loadUsers(){
    tbEl.innerHTML = `<tr><td colspan="5">Betöltés...</td></tr>`;
    const r = await fetch("/api/admin/users", { credentials:"include" });
    if (!r.ok) { tbEl.innerHTML = `<tr><td colspan="5">Hiba (${r.status})</td></tr>`; return; }
    const data = await r.json();
    const rows = data.rows || [];

    tbEl.innerHTML = rows.map(u => `
      <tr>
        <td>${u.ID_USER}</td>
        <td><input class="form-control form-control-sm" data-f="NEV" data-id="${u.ID_USER}" value="${u.NEV ?? ""}"></td>
        <td><input class="form-control form-control-sm" data-f="EMAIL" data-id="${u.ID_USER}" value="${u.EMAIL ?? ""}"></td>
        <td>
          <select class="form-select form-select-sm" data-f="CSOPORT" data-id="${u.ID_USER}">
            <option ${u.CSOPORT==="Students"?"selected":""}>Students</option>
            <option ${u.CSOPORT==="Teachers"?"selected":""}>Teachers</option>
            <option ${u.CSOPORT==="Boss"?"selected":""}>Boss</option>
          </select>
        </td>
        <td>
          <button class="btn btn-sm btn-warning" data-act="save" data-id="${u.ID_USER}">Mentés</button>
          <button class="btn btn-sm btn-danger" data-act="del" data-id="${u.ID_USER}">Törlés</button>
        </td>
      </tr>
    `).join("") || `<tr><td colspan="5">Nincs user</td></tr>`;
  }

  document.getElementById("reloadBtn").onclick = loadUsers;

  tbEl.addEventListener("click", async (e) => {
    const btn = e.target.closest("button");
    if (!btn) return;
    const id = btn.dataset.id;
    const act = btn.dataset.act;

    if (act === "save") {
      const nev = tbEl.querySelector(`[data-f="NEV"][data-id="${id}"]`).value.trim();
      const email = tbEl.querySelector(`[data-f="EMAIL"][data-id="${id}"]`).value.trim();
      const csoport = tbEl.querySelector(`[data-f="CSOPORT"][data-id="${id}"]`).value;

      const r = await fetch(`/api/admin/users/${id}`, {
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        credentials:"include",
        body: JSON.stringify({ nev, email, csoport })
      });

      if (!r.ok) { showMsg(await r.text(), false); return; }
      showMsg("Mentve ✅");
      loadUsers();
    }

    if (act === "del") {
      if (!confirm("Biztos törlöd?")) return;
      const r = await fetch(`/api/admin/users/${id}`, {
        method:"DELETE",
        credentials:"include"
      });
      if (!r.ok) { showMsg(await r.text(), false); return; }
      showMsg("Törölve ✅");
      loadUsers();
    }
  });

  (async () => {
    if (!(await mustBeBoss())) return;
    loadUsers();
  })();

})();
</script>

</body>
</html>
