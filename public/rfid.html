<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RFID Beléptetés</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <link href="style.css" rel="stylesheet">
  <script src="common_studio13.js"></script>
  <link rel="icon" href="/favicon-32x32.png" type="image/png">
</head>

<body>
  <div class="app-wrap">
    <div class="d-flex align-items-center justify-content-between gap-2 mb-3">
      <h2 class="m-0">RFID Beléptetés</h2>
    </div>

    <div class="app-card">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">RFID kód:</label>
          <input id="rfid_input" type="text" class="form-control" placeholder="RFID kód">
        </div>

        <div class="col-12">
          <label class="form-label">Sulikezdés:</label>
          <input id="start_time" type="time" class="form-control" value="07:50">
        </div>

        <div class="col-12">
          <button id="rfid_btn" class="btn btn-primary">Keresés</button>
        </div>
      </div>

      <hr class="my-4">

      <h4 class="mb-2">Eredmény:</h4>
      <div id="eredmeny"></div>
    </div>
  </div>

  <script>
  (function () {
    var rfidBtn = document.getElementById("rfid_btn");
    var rfidInput = document.getElementById("rfid_input");
    var startTimeInput = document.getElementById("start_time");
    var eredmenyDiv = document.getElementById("eredmeny");

    if (!rfidBtn) return;

    rfidBtn.addEventListener("click", async function (e) {
      e.preventDefault();

      var kod = rfidInput.value.trim();
      if (!kod) {
        alert("Adj meg RFID kódot!");
        return;
      }

      var start = startTimeInput.value;

      try {
        var res = await fetch(
          `/api/rfid/event?kod=${encodeURIComponent(kod)}&direction=in&start=${encodeURIComponent(start)}`,
          { credentials: "include" }
        );

        if (!res.ok) {
          var msg = await res.text();
          eredmenyDiv.innerHTML = `<p class="text-danger">${msg}</p>`;
          return;
        }

        var data = await res.json();

        var statusText =
          data.status === "late"
            ? `KÉSÉS: ${data.diffMinutes} perc`
            : "Időben érkezett";

        eredmenyDiv.innerHTML = `
          <div class="app-panel p-3">
            <p class="mb-1"><b>Név:</b> ${data.NEV}</p>
            <p class="mb-1"><b>Email:</b> ${data.EMAIL}</p>
            <p class="mb-1"><b>OM:</b> ${data.OM || "-"}</p>
            <p class="mb-1"><b>Sulikezdés:</b> ${start}</p>
            <p class="mt-2"><b>${statusText}</b></p>
            <button id="ok_btn" class="btn btn-secondary">OK</button>
          </div>
        `;

        document.getElementById("ok_btn").onclick = function () {
          rfidInput.value = "";
          eredmenyDiv.innerHTML = "";
          rfidInput.focus();
        };

      } catch (err) {
        console.error(err);
        eredmenyDiv.innerHTML = "<p class='text-danger'>Hiba történt</p>";
      }
    });

  })();
  </script>
</body>
</html>
