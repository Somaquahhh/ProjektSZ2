<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RFID Beléptetés</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <link href="style.css" rel="stylesheet">
  <script src="common_studio13.js"></script>
  <link rel="icon" href="/favicon-32x32.png" type="image/png">

  <script>
    (function () {
    
      const rfidInput = document.getElementById("rfid_input");
      const startTimeInput = document.getElementById("start_time");
      const eredmenyDiv = document.getElementById("eredmeny");
    
      if (!rfidInput) return;
    
      let busy = false;
      let debounceTimer = null;
      let clearTimer = null;
    
      async function runLookup() {
    
        const kod = rfidInput.value.trim();
        if (!kod) return;
        if (busy) return;
    
        busy = true;
    
        const start = startTimeInput?.value || "07:50";
    
        try {
          const res = await fetch(
            `/api/rfid/event?kod=${encodeURIComponent(kod)}&direction=in&start=${encodeURIComponent(start)}`,
            { credentials: "include" }
          );
    
          if (!res.ok) {
            const msg = "A teljes kódot add meg.";
            eredmenyDiv.innerHTML =
              `<p class="text-danger">${msg}</p>`;
            return;
          }
    
          const data = await res.json();
    
          const statusText =
            data.status === "late"
              ? `KÉSÉS: ${data.diffMinutes} perc`
              : "Időben érkezett";
    
          eredmenyDiv.innerHTML = `
            <div class="app-panel p-3">
              <p class="mb-1"><b>Név:</b> ${data.NEV}</p>
              <p class="mb-1"><b>Email:</b> ${data.EMAIL}</p>
              <p class="mb-1"><b>OM:</b> ${data.OM || "-"}</p>
              <p class="mb-1"><b>Sulikezdés:</b> ${start}</p>
              <p class="mt-2"><b>${statusText}</b></p>
            </div>
          `;
    
          // input reset (scannerhez)
          rfidInput.value = "";
          rfidInput.focus();
    
          // ===== IDŐZÍTŐ JAVÍTÁS =====
          // régi törlés leállítása
          if (clearTimer) clearTimeout(clearTimer);
    
          // új törlés (15 mp után)
          clearTimer = setTimeout(() => {
            eredmenyDiv.innerHTML = "";
            clearTimer = null;
          }, 15000);
    
        } catch (err) {
          console.error(err);
          eredmenyDiv.innerHTML =
            "<p class='text-danger'>Hiba történt</p>";
        } finally {
          busy = false;
        }
      }
    
      // RFID scanner debounce
      rfidInput.addEventListener("input", () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(runLookup, 120);
      });
    
      // ha ENTER-t küld a scanner
      rfidInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          clearTimeout(debounceTimer);
          runLookup();
        }
      });
    
    })();
    </script>
</head>

<body>
  <div class="app-wrap">
    <div class="d-flex align-items-center justify-content-between gap-2 mb-3">
      <h2 class="m-0">RFID Beléptetés</h2>
    </div>

    <div class="app-card">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">RFID kód:</label>
          <input id="rfid_input" type="text" class="form-control" placeholder="RFID kód" autocomplete="off" autofocus>
        </div>

        <div class="col-12">
          <label class="form-label">Sulikezdés:</label>
          <input id="start_time" type="time" class="form-control" value="07:50">
        </div>

        <div class="col-12">
          <button id="rfid_btn" class="btn btn-primary">Keresés</button>
        </div>
      </div>

      <hr class="my-4">

      <h4 class="mb-2">Eredmény:</h4>
      <div id="eredmeny"></div>
    </div>
  </div>

 
</body>
</html>
